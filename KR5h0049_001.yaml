front:
  text: 諸神聖誕日玉匣記等集目録
  hash: sha256:00ab127b249664e06e5224c5ac0e8f96ee7f0b2aec4542e7fca0b28d8a7eab87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0049_HFL_001-001a, image: hfl/1108/1108-004.png}
body:
  text: 聖誕令節日期許真君玉匣記法師選擇記合帳試新衣日太子洗頭日文殊裁衣日男女值年星命之屬金符經諸葛先生出行之圖出行吉㐫時面熱眼跳耳熱耳鳴嚏噴肉顫心驚鵲噪等項法神仙探病日碧玉經出行日得病疾日枯焦紅沙黄沙鬼哭日二十八宿吉㐫之圖六十花甲子喜神方諸神聖誕令節日期正月初一日天臘之辰彌勒佛聖誕初八日定光佛聖誕江東聖誕初九日玉皇上帝聖誕十三日劉猛將聖誕十五日上元天官聖誕𥘉八日至十五日顯大神通降魔此日戒齋比常日有千萬功徳二月𥘉二日土地正神聖誕𥘉三日梓潼帝君聖誕𥘉八日釋迦文佛出家此日念經一卷此常日千萬功徳十五日太上老君聖誕十九日觀音菩薩聖誕二十一日普賢菩薩聖誕三月𥘉三日真武上帝聖誕十五日趙元帥聖誕祖天師聖誕十八日后土娘娘聖誕二十日子孫娘娘聖誕二十三日天妃娘娘聖誕二十八日東嶽聖誕四月𥘉四日文殊菩薩聖誕狄梁公聖誕𥘉八日釋迦文佛聖誕十五日成道此日念真言一句比常日有千萬功徳十八日紫㣲大帝聖誕頂上娘娘聖誕二十八日藥王聖誕五月𥘉五日地臘之辰温元帥聖誕𥘉七日朱太尉聖誕十一日都城隍聖誕十二日炳靈公聖誕十三日關王聖降十六日天地玄炁及造化萬物之辰最宜戒酒色六月𥘉四日南瞻部洲轉大法輪此日供飬一日比常日十千萬功徳十三日井龍王聖誕十九日觀音菩薩成佛二十三日南方火神聖誕王天將聖誕馬神聖誕二十四日九天應元雷聲普化天尊聖誕雷祖聖誕關王聖誕二十六日二郎聖誕七月𥘉十日道徳臘之辰十三日大勢至菩薩聖誕十五日中元地官聖誕靈濟真君聖誕十八日王母娘娘聖誕十九日殷太𡻕聖誕二十一日普庵祖師聖誕二十四日龍𣗳王菩薩聖誕三十日地蔵王菩薩聖誕八月初三日竈君聖誕十五日太隂朝元之辰宜守夜燒香二十二日燃燈佛聖誕𥘉三日二十七日北斗下降毎月𥘉八日十四日十五日二十三日二十九日三十日毎日持齋念佛誦經勝如常日十千萬功徳出西天玉經九月𥘉三日五瘟聖誕𥘉九日葛仙翁聖誕蒿里聖誕十五日從三十三天南瞻部洲救度衆生此日布施一文常日十千萬功徳先師聖人聖誕十七日増福財神聖誕洪恩真君聖誕二十三日薩祖師聖誕二十八日馬元帥聖誕五顯靈官聖誕三十日琉璃光王佛聖誕十月𥘉一日民歳𡻕之辰𥘉三日三茅真君聖誕𥘉五日逹摩祖師聖誕𥘉六日天曹諸祠五嶽五帝聖誕之辰𥘉八日湼盤此日放生一個比常日放生十千萬功徳此日作一罪業比常日作十千萬罪業十五日下元水官聖誕十一月十一日太乙救苦天尊聖誕十七日阿彌陀佛聖誕十九日日光天子聖誕二十三日張仙聖誕十二月𥘉一日念經一卷比常日念經勝如十千萬功徳𥘉八日王侯臘之辰釋迦佛成佛念經一卷比常日念經勝如十千萬功徳二十九日華嚴菩薩聖誕凡遇聖誕之日𢦙齋僧𢦙施錢𢦙看經𢦙念佛比常日有十萬功徳十帝閻君聖誕一丹景山警戒正月𥘉八日四閻王聖誕二月𥘉一日頭閻王聖誕二十七日六閻王聖誕二十八日三閻王聖誕三月𥘉一日二閻王聖誕𥘉七日七閻王聖誕初八日五閻王聖誕四月初一日八閻王聖誕𥘉七日九閻王聖誕二十二日十閻王聖誕昔日山東濟南府臨清縣儒學生員李清扵景㤗六年八月初三日身死到閻君面前親問你任陽間作何善事李清荅曰弟子在陽間毎扵釋迦牟尼佛四月𥘉八日䧏生持齋一日念佛一萬聲間君起身善哉善㢤此人大有功德閻君問曰吾十閻君䧏生之日無人持齋念佛李清荅曰陽間不知閻君降誔之日閻君荅曰我每傳與你降生之日今與你還魂說與陽間善男子善女人每逢䧏生之日持齋念佛見世安樂過去超生閻君即差鬼使送此人還瑰陽間李清忽然甦醒回來發心從頭寫出十帝降生之日傅與四方善男信女依此日香燈紙燭供飬閻君永不堕地獄好䖏生天
  hash: sha256:b90d3a48fc0cfe24aa631d0a200ae84aa6a325763a1f987ffe6cc25e1de5bf3b
